name: Build & Release (picotun)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.1"
          cache: true

      - name: Verify module
        run: |
          go env
          go mod download
          go mod tidy
          git diff --exit-code || (echo "go.mod/go.sum changed; commit them first." && exit 1)

      - name: Build linux amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/picotun-linux-amd64 ./cmd/picotun

      - name: Build linux arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -trimpath -ldflags="-s -w" -o dist/picotun-linux-arm64 ./cmd/picotun

      - name: Checksums
        run: |
          (cd dist && sha256sum picotun-linux-amd64 picotun-linux-arm64 > sha256sums.txt)

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/picotun-linux-amd64
            dist/picotun-linux-arm64
            dist/sha256sums.txt
          generate_release_notes: true
